<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASIC</title>
</head>
<body>
<style>
    *{
        padding: 0;
        margin: 0;
    }
    .container{
        height:100vh;
        width: 100%;
        display: flex;
        justify-content:center;
        align-items: center;
        background-color:rgba(0,0,0,0.8);
    }
    .outer{
        height: 100px;
        width: 200px;
        border: 5px solid black;
        border-radius: 50px;
        box-shadow: 1px 3px 10px black;
        background-color: black;
        display: flex;
        align-items: center;
        justify-content:start;
        padding-left: 4px;
    }
    .toggle{
        cursor:pointer;
        background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRCWWb1bhNT1nVLW93jZtbKgo3LxdcmKmG3WA&s');
        background-size:contain;
        height: 90px;
        width: 100px;
        display: flex;
        justify-content: center;
        align-items:end;
        color:transparent;
        font-family: cursive;
        font-size:0px;
        font-weight: bold;
        border: 4px solid rgba(255,255,255,0.15);
        box-shadow: 1px 2px 10px black;
        border-radius: 50%;
        transform:translate(0,0);
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
    }

    .move-toggle{
        background-image: url("https://png.pngtree.com/png-vector/20221130/ourmid/pngtree-bright-sun-vector-illustration-png-image_6486315.png");
        background-size:cover;
        align-items:center;
        color:transparent;
        transform: translateX(90px);

    }


</style>

<div class="container">
    <div class="outer">
        <div class="toggle">OFF</div>
    </div>
</div>
